name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and release (e.g. v0.6.3)'
        required: true

permissions:
  contents: write
  actions: read

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-x86_64-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross
        run: cargo install cross

      - name: Build
        # Only the two shipped binaries; tokengauge-popover pulls GTK4/glib
        # system libs the cross image doesn't have, and it isn't packaged here.
        run: cross build --release --target x86_64-unknown-linux-gnu -p tokengauge-waybar -p tokengauge-tui

      - name: Package
        env:
          REF_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/tokengauge-waybar dist/
          cp target/x86_64-unknown-linux-gnu/release/tokengauge-tui dist/
          tar -czf dist/tokengauge-${REF_NAME}-linux-x86_64.tar.gz -C dist tokengauge-waybar tokengauge-tui

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tokengauge-x86_64
          path: dist/tokengauge-*-linux-x86_64.tar.gz
          if-no-files-found: error

  build-aarch64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-aarch64-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross
        run: cargo install cross

      - name: Build
        # Only the two shipped binaries; tokengauge-popover pulls GTK4/glib
        # system libs the cross image doesn't have, and it isn't packaged here.
        run: cross build --release --target aarch64-unknown-linux-gnu -p tokengauge-waybar -p tokengauge-tui

      - name: Package
        env:
          REF_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          mkdir -p dist
          cp target/aarch64-unknown-linux-gnu/release/tokengauge-waybar dist/
          cp target/aarch64-unknown-linux-gnu/release/tokengauge-tui dist/
          tar -czf dist/tokengauge-${REF_NAME}-linux-aarch64.tar.gz -C dist tokengauge-waybar tokengauge-tui

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tokengauge-aarch64
          path: dist/tokengauge-*-linux-aarch64.tar.gz
          if-no-files-found: error


  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-windows-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        # Only the TUI runs on Windows; waybar and popover are Linux-only.
        run: cargo build --release --target x86_64-pc-windows-msvc -p tokengauge-tui

      - name: Package
        shell: pwsh
        env:
          REF_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          # Sanitize the tag/ref so path separators can't break out of dist/.
          $safe = $env:REF_NAME -replace '[^A-Za-z0-9._-]', '_'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/tokengauge-tui.exe dist/
          Compress-Archive -Path dist/tokengauge-tui.exe -DestinationPath "dist/tokengauge-$safe-windows-x86_64.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tokengauge-windows-x86_64
          path: dist/tokengauge-*-windows-x86_64.zip
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [build-x86_64, build-aarch64, build-windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: tokengauge-*
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.zip
