name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and release (e.g. v0.6.3)'
        required: true

permissions:
  contents: write
  actions: read

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-x86_64-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross
        run: cargo install cross

      - name: Build
        # Only the two shipped binaries; tokengauge-popover pulls GTK4/glib
        # system libs the cross image doesn't have, and it isn't packaged here.
        run: cross build --release --target x86_64-unknown-linux-gnu -p tokengauge-waybar -p tokengauge-tui

      - name: Package
        env:
          REF_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          # Sanitize the tag/ref so path separators can't break the archive path.
          SAFE_REF="${REF_NAME//[^A-Za-z0-9._-]/_}"
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/tokengauge-waybar dist/
          cp target/x86_64-unknown-linux-gnu/release/tokengauge-tui dist/
          tar -czf "dist/tokengauge-${SAFE_REF}-linux-x86_64.tar.gz" -C dist tokengauge-waybar tokengauge-tui

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tokengauge-x86_64
          path: dist/tokengauge-*-linux-x86_64.tar.gz
          if-no-files-found: error

  build-aarch64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: aarch64-unknown-linux-gnu

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-aarch64-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross
        run: cargo install cross

      - name: Build
        # Only the two shipped binaries; tokengauge-popover pulls GTK4/glib
        # system libs the cross image doesn't have, and it isn't packaged here.
        run: cross build --release --target aarch64-unknown-linux-gnu -p tokengauge-waybar -p tokengauge-tui

      - name: Package
        env:
          REF_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          # Sanitize the tag/ref so path separators can't break the archive path.
          SAFE_REF="${REF_NAME//[^A-Za-z0-9._-]/_}"
          mkdir -p dist
          cp target/aarch64-unknown-linux-gnu/release/tokengauge-waybar dist/
          cp target/aarch64-unknown-linux-gnu/release/tokengauge-tui dist/
          tar -czf "dist/tokengauge-${SAFE_REF}-linux-aarch64.tar.gz" -C dist tokengauge-waybar tokengauge-tui

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tokengauge-aarch64
          path: dist/tokengauge-*-linux-aarch64.tar.gz
          if-no-files-found: error


  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-windows-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        # The TUI and the tray GUI run on Windows; waybar and popover are Linux-only.
        run: cargo build --release --target x86_64-pc-windows-msvc -p tokengauge-tui -p tokengauge-tray

      - name: Package
        shell: pwsh
        env:
          REF_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          # Sanitize the tag/ref so path separators can't break out of dist/.
          # Must match scripts/install.ps1 so the published asset name lines up.
          $safe = $env:REF_NAME -replace '[^A-Za-z0-9._-]', '_'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/tokengauge-tui.exe dist/
          Copy-Item target/x86_64-pc-windows-msvc/release/tokengauge-tray.exe dist/
          Compress-Archive -Path dist/tokengauge-tui.exe,dist/tokengauge-tray.exe -DestinationPath "dist/tokengauge-$safe-windows-x86_64.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tokengauge-windows-x86_64
          path: dist/tokengauge-*-windows-x86_64.zip
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [build-x86_64, build-aarch64, build-windows]
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist
          pattern: tokengauge-*
          merge-multiple: true

      - name: Extract release notes from CHANGELOG
        env:
          REF_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          awk -v hdr="## [$VERSION]" '
            index($0, hdr) == 1 { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::No CHANGELOG.md section for $VERSION - falling back to auto-generated notes."
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          body_path: release-notes.md
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
